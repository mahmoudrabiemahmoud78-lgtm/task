<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>
    <style>
        /* صفحة الطلب */

body{
    margin: 0;
    padding: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #f5f5f5;
}
h1{
    text-align: center;
}
#order-page{
  height: fit-content;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 6px 6px;
}

.order-box{
    width: 400px;
    background: white;

    padding: 25px;

    border-radius: 15px;

    box-shadow: 0 0 20px rgba(0,0,0,0.1);
}

.order-box h1{
    text-align: center;
    margin-bottom: 25px;

    color: #222;
}

.order-box input,
.order-box textarea{
    width: 100%;

    padding: 12px;

    margin-bottom: 15px;

    border: 1px solid #ccc;

    border-radius: 10px;

    outline: none;

    font-size: 16px;

    box-sizing: border-box;
}

.order-box textarea{
    resize: none;
    height: 100px;
}

.order-box input:focus,
.order-box textarea:focus{
    border-color: #4f46e5;
}

.order-box button{
    width: 100%;

    padding: 14px;

    border: none;

    border-radius: 10px;

    background: #4f46e5;

    color: white;

    font-size: 17px;

    cursor: pointer;

    transition: 0.3s;
}

.order-box button:hover{
    background: #372fcf;
}
    </style>
</head>
<body>

<h1>data order</h1>

<form>
    <div id="order-page">

    <div class="order-box">

        <h1>Order now</h1>

        <input type="text" required placeholder="Your name">

        <input type="text" required placeholder="Your address">

        <input type="text" required placeholder="Phone number">

        <textarea placeholder="Notes"></textarea>

        <button  id="confirm">Confirm order</button>

    </div>

    </div>
</form>
<script>
    console.log(localStorage.getItem("cart"));
   document.getElementById("confirm").addEventListener("click", (e) => {
    e.preventDefault();

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    let name = document.querySelector("input[placeholder='Your name']").value;
    let address = document.querySelector("input[placeholder='Your address']").value;
    let phoneUser = document.querySelector("input[placeholder='Phone number']").value;
    let notes = document.querySelector("textarea").value;

    let msg = `New Order:`;

    msg += `Name: ${name}|   `;
    msg += `Address: ${address}|    `;
    msg += `Phone: ${phoneUser}|  `;
    msg += `Notes: ${notes}|  `;

    msg += `--- Products ---`;

    let total = 0;

    cart.forEach(p => {

        let price = parseFloat(p.price.replace("$", ""));
        let itemTotal = price * p.qty;

        total += itemTotal;

        msg += `${p.name} - ${p.price} x ${p.qty} = ${itemTotal}`;
    });

    msg += `Total: ${total}$`;

    let ownerPhone = "201552701888";

    window.open(`https://wa.me/${ownerPhone}?text=${msg}`, "_blank");

    localStorage.removeItem("cart");
});
    
</script>

</body>
</html>
